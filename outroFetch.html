<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Teste com Fetch</title>
</head>

<body>
    <h1>Buscando dados com Fetch</h1>

    <button id="buscar">Buscar Pokémon</button>

    <div id="resultado"></div>

    <script>
        const botao = document.querySelector("#buscar");
        const resultado = document.querySelector("#resultado");

        botao.addEventListener("click", async () => {
            const resposta = await fetch("https://pokeapi.co/api/v2/pokemon/pikachu");
            const dados = await resposta.json();

            resultado.innerHTML = `
            <h2>${dados.name}</h2>
            <p>Altura: ${dados.height}</p>
            <p>Peso: ${dados.weight}</p>
            `;
        });
    </script>
</body>

</html>
